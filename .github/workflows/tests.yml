name: Testes Automatizados - ServeRest API

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  tests:
    name: Executar suíte de testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes com relatório HTML
        run: pytest -vv --html=reports/relatorio.html --self-contained-html

      - name: Upload do relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-html
          path: reports/relatorio.html
          retention-days: 7
