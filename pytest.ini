[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --strict-markers
markers =
    usuarios: testes relacionados ao endpoint de usuários
    login: testes relacionados ao endpoint de login
    produtos: testes relacionados ao endpoint de produtos
    carrinhos: testes relacionados ao endpoint de carrinhos
    contrato: testes de validação de contrato/estrutura de resposta via JSON Schema
